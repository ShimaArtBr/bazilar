<!DOCTYPE html>
<html lang="pt" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAZILAR — BaZi Calculator</title>
<meta name="description" content="BAZILAR — Precision astronomical BaZi calculator. Four Pillars, Hidden Stems, Luck Pillars, Ten Gods.">
<meta property="og:title" content="BAZILAR — Precision BaZi Calculator">
<meta property="og:type" content="website">
<meta name="theme-color" content="#0A0A0F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPBAR -->
<header class="topbar">
  <a href="#" class="topbar-brand" onclick="return false">
    <div class="topbar-sym" aria-hidden="true">八</div>
    <span class="brand-name">BAZILAR</span>
    <span class="brand-by">by SOLLUN</span>
  </a>
  <div class="topbar-right">
    <div class="gender-wrap">
      <button class="gender-btn active" data-g="M" id="gM" aria-pressed="true">♂</button>
      <button class="gender-btn"        data-g="F" id="gF" aria-pressed="false">♀</button>
    </div>

    <!-- Language Dropdown -->
    <div class="lang-wrap" id="langWrap">
      <button class="lang-btn" id="langBtn"
        aria-haspopup="true" aria-expanded="false" aria-controls="langMenu"
        aria-label="Select language">
        <span id="langFlag" aria-hidden="true">🇧🇷</span>
        <span id="langLabel">PT</span>
        <span class="lang-arrow" aria-hidden="true">▾</span>
      </button>
      <div class="lang-menu" id="langMenu" role="menu">
        <button class="lang-opt" role="menuitem" data-lang="en" tabindex="-1"><span aria-hidden="true">🇺🇸</span> English</button>
        <button class="lang-opt" role="menuitem" data-lang="zh" tabindex="-1"><span aria-hidden="true">🇨🇳</span> <span class="zh-label">中文</span></button>
        <button class="lang-opt" role="menuitem" data-lang="es" tabindex="-1"><span aria-hidden="true">🇪🇸</span> Español</button>
        <button class="lang-opt active" role="menuitem" data-lang="pt" tabindex="0"><span aria-hidden="true">🇧🇷</span> Português</button>
      </div>
    </div>

    <!-- Dark / Light toggle -->
    <button class="theme-btn" id="themeBtn" aria-label="Toggle dark/light mode">
      <span id="themeIcon">☀️</span>
    </button>
  </div>
</header>

<!-- PAGE -->
<div class="page">

  <!-- INPUT PANEL -->
  <aside class="input-panel" aria-label="Birth data">
    <h2 class="panel-title" id="uiTitle">Dados de Nascimento</h2>

    <!-- Date -->
    <div class="field-group">
      <span class="field-label" id="uiDate">Data</span>
      <div class="field-row3">
        <div>
          <label class="field-label field-label--sm" for="inY" id="uiYear">Ano</label>
          <input type="number" id="inY" value="1990" min="1800" max="2200">
        </div>
        <div>
          <label class="field-label field-label--sm" for="inM" id="uiMonth">Mês</label>
          <input type="number" id="inM" value="6" min="1" max="12">
        </div>
        <div>
          <label class="field-label field-label--sm" for="inD" id="uiDay">Dia</label>
          <input type="number" id="inD" value="15" min="1" max="31">
        </div>
      </div>
    </div>

    <!-- Time -->
    <div class="field-group">
      <label class="field-label" for="inT" id="uiTime">Hora (00:00 – 23:59)</label>
      <input type="time" id="inT" value="14:35">
    </div>

    <!-- City -->
    <div class="field-group">
      <label class="field-label" for="inCity" id="uiCity">Local de Nascimento</label>
      <div class="geo-wrap">
        <input type="text" id="inCity" value="" placeholder="ex: São Paulo, Brasil"
          autocomplete="off" aria-autocomplete="list" aria-controls="sugBox">
        <div class="geo-spin" id="geoSpin" aria-hidden="true"></div>
        <div class="sug-box" id="sugBox" role="listbox" aria-label="Sugestões de local"></div>
      </div>
      <p class="loc-prev" id="locPrev"></p>
    </div>

    <!-- Coordinates -->
    <div class="field-group">
      <div class="field-row">
        <div>
          <label class="field-label" for="inLo" id="uiLong">Longitude</label>
          <input type="number" id="inLo" value="-46.63" step="0.01" min="-180" max="180">
        </div>
        <div>
          <label class="field-label" for="inLa" id="uiLat">Latitude</label>
          <input type="number" id="inLa" value="-23.55" step="0.01" min="-90" max="90">
        </div>
      </div>
    </div>

    <!-- Timezone -->
    <div class="field-group">
      <label class="field-label" for="inTZ" id="uiTZ">Fuso Horário (GMT)</label>
      <select id="inTZ">
        <option value="-12">GMT −12</option><option value="-11">GMT −11</option>
        <option value="-10">GMT −10</option><option value="-9.5">GMT −9:30</option>
        <option value="-9">GMT −9</option><option value="-8">GMT −8</option>
        <option value="-7">GMT −7</option><option value="-6">GMT −6</option>
        <option value="-5">GMT −5</option><option value="-4.5">GMT −4:30</option>
        <option value="-4">GMT −4</option><option value="-3.5">GMT −3:30</option>
        <option value="-3" selected>GMT −3</option>
        <option value="-2">GMT −2</option><option value="-1">GMT −1</option>
        <option value="0">GMT 0</option><option value="1">GMT +1</option>
        <option value="2">GMT +2</option><option value="3">GMT +3</option>
        <option value="3.5">GMT +3:30</option><option value="4">GMT +4</option>
        <option value="4.5">GMT +4:30</option><option value="5">GMT +5</option>
        <option value="5.5">GMT +5:30</option><option value="5.75">GMT +5:45</option>
        <option value="6">GMT +6</option><option value="6.5">GMT +6:30</option>
        <option value="7">GMT +7</option><option value="8">GMT +8</option>
        <option value="9">GMT +9</option><option value="9.5">GMT +9:30</option>
        <option value="10">GMT +10</option><option value="10.5">GMT +10:30</option>
        <option value="11">GMT +11</option><option value="12">GMT +12</option>
      </select>
    </div>

    <!-- DST -->
    <div class="chk-row">
      <input type="checkbox" id="inDST">
      <label for="inDST" id="uiDST">Ajuste de Horário de Verão (DST)</label>
    </div>

    <!-- Calculate button -->
    <button class="calc-btn" id="calcBtn">
      <span id="uiCalc">Calcular Quatro Pilares</span>
    </button>
  </aside>

  <!-- RESULTS -->
  <main id="results" aria-live="polite">
    <div class="empty" id="emptyState">
      <div class="empty-ico" aria-hidden="true">八</div>
      <h2 class="empty-ttl" id="uiEmpTitle">Motor de Cálculo BaZi</h2>
      <p class="empty-sub" id="uiEmpSub">Preencha os dados e clique em Calcular para gerar os Quatro Pilares com base no Tempo Solar Real e nos Termos Solares astronômicos.</p>
    </div>
  </main>

</div>

<!-- Único ponto de entrada JS — tudo via ES Modules -->
<script type="module" src="js/app.js"></script>

</body>
</html>
