<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0A0A0F"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#C4A35A" stroke-width="3" stroke-dasharray="12 8" opacity="0.4"/>

  <!-- Inner ring -->
  <circle cx="256" cy="256" r="165" fill="none" stroke="#C4A35A" stroke-width="1.5" opacity="0.2"/>

  <!-- Bagua-inspired 8 marks -->
  <g stroke="#C4A35A" stroke-width="2" opacity="0.35">
    <line x1="256" y1="46"  x2="256" y2="86"/>
    <line x1="404" y1="108" x2="378" y2="133"/>
    <line x1="466" y1="256" x2="426" y2="256"/>
    <line x1="404" y1="404" x2="378" y2="379"/>
    <line x1="256" y1="466" x2="256" y2="426"/>
    <line x1="108" y1="404" x2="134" y2="379"/>
    <line x1="46"  y1="256" x2="86"  y2="256"/>
    <line x1="108" y1="108" x2="134" y2="133"/>
  </g>

  <!-- 命 character (destiny/life) -->
  <text
    x="256" y="300"
    text-anchor="middle"
    font-family="'Noto Sans SC', 'PingFang SC', 'SimSun', serif"
    font-size="200"
    fill="#C4A35A"
    opacity="0.95"
  >命</text>

  <!-- Subtle glow dot at center -->
  <circle cx="256" cy="256" r="4" fill="#C4A35A" opacity="0.6"/>
</svg>
